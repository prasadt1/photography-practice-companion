name: Iris
options:
  bundleIdPrefix: com.prasadtilloo
  deploymentTarget:
    iOS: "17.0"
  groupSortPosition: top
  createIntermediateGroups: true

packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: 11.5.0
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: 7.1.0

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

targets:
  Iris:
    type: application
    platform: iOS
    sources:
      - path: Iris
      # Drop GoogleService-Info.plist next to this file, then: xcodegen generate
      - path: GoogleService-Info.plist
        optional: true
        buildPhase: resources
    configFiles:
      Debug: Config/Debug.xcconfig
      Release: Config/Release.xcconfig
    dependencies:
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseCore
      - package: GoogleSignIn
        product: GoogleSignIn
    info:
      path: Iris/Info.plist
      properties:
        UILaunchScreen: {}
        CFBundleURLTypes:
          - CFBundleTypeRole: Editor
            CFBundleURLSchemes:
              - com.googleusercontent.apps.975418990849-oroknev6nmunjn5sc58rlkuj0tltphg8
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.prasadtilloo.practicecompanion
        INFOPLIST_KEY_CFBundleDisplayName: Iris
        INFOPLIST_KEY_NSCameraUsageDescription: "Iris uses the camera to capture photos for practice assignments and coaching."
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "Iris can import photos from your library when the camera is unavailable."
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Iris uses the microphone for voice commands during field coaching (coming soon)."
        INFOPLIST_KEY_APIBaseURL: $(API_BASE_URL)
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UIRequiresFullScreen: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.2.0
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        OTHER_LDFLAGS: "$(inherited) -ObjC"

schemes:
  Iris:
    build:
      targets:
        Iris: all
    run:
      config: Debug
