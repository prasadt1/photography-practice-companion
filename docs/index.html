  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Newsreader';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"77951274-4785-4f08-a2ca-95e0d5ecdc04\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Newsreader';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"6d1e7e93-c6a9-4eb9-a4c8-73a19102b7e8\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Newsreader';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"c5680077-68ed-495f-8de9-4276edf8b0b7\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Newsreader';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"77951274-4785-4f08-a2ca-95e0d5ecdc04\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n/* ===========================================================================\n   Iris — Color tokens\n   A \"warm gallery\" palette: lit-from-within darkroom neutrals (warm, never\n   pure black/grey) under a single amber/gold brand accent. The dark theme is\n   the default; light theme is a warm-paper inversion.\n   =========================================================================== */\n\n:root {\n  /* --- Brand: amber / gold (the only chromatic hue in the system) --------- */\n  --brand-50: #fffbeb;\n  --brand-100: #fef3c7;\n  --brand-200: #fde68a;\n  --brand-300: #fcd34d;\n  --brand-400: #fbbf24; /* hover / highlight */\n  --brand-500: #f59e0b; /* primary brand */\n  --brand-600: #d97706;\n  --brand-700: #b45309;\n\n  /* --- Warm neutral surfaces (darkroom) ---------------------------------- */\n  --canvas: #1a1816;          /* page background */\n  --canvas-elevated: #242120; /* raised panels */\n  --surface-1: #2a2724;       /* cards */\n  --surface-2: #332f2b;       /* inputs, segmented controls */\n  --surface-3: #3d3834;       /* hover wells, chips */\n  --photo-black: #0a0908;     /* photo matting surround */\n  --warm-border: #44403c;     /* hairline borders */\n  --warm-border-strong: #57534e;\n\n  /* --- Text ------------------------------------------------------------- */\n  --text-strong: #ffffff;     /* headlines on dark */\n  --text-body: #e7e5e4;       /* default body (stone-200) */\n  --text-secondary: #d6d3d1;  /* stone-300 */\n  --text-muted: #a8a29e;      /* captions, helper (stone-400) */\n  --text-faint: #78716c;      /* disabled / least-emphasis (stone-500) */\n  --text-on-brand: #1a1816;   /* text on amber fills */\n\n  /* --- Semantic status --------------------------------------------------- */\n  --success: #4ade80;   /* green-400 — positive deltas */\n  --danger: #fb7185;    /* rose-400 — errors */\n  --danger-surface: rgba(244, 63, 94, 0.10);\n  --danger-border: rgba(244, 63, 94, 0.30);\n\n  /* --- Brand alpha washes (used constantly for tinted chips/cards) ------- */\n  --brand-wash-08: rgba(245, 158, 11, 0.08);\n  --brand-wash-10: rgba(245, 158, 11, 0.10);\n  --brand-wash-15: rgba(245, 158, 11, 0.15);\n  --brand-wash-20: rgba(245, 158, 11, 0.20);\n  --brand-wash-40: rgba(245, 158, 11, 0.40);\n  --selection: rgba(245, 158, 11, 0.35);\n\n  /* --- Semantic aliases (prefer these in components) -------------------- */\n  --bg-page: var(--canvas);\n  --bg-card: var(--surface-1);\n  --bg-input: var(--surface-2);\n  --bg-well: var(--surface-3);\n  --border-default: var(--warm-border);\n  --border-hover: var(--brand-wash-40);\n  --accent: var(--brand-500);\n  --accent-hover: var(--brand-400);\n}\n\n/* --- Light theme: warm-paper gallery ------------------------------------- */\nhtml[data-theme='light'] {\n  --canvas: #f5f0ea;\n  --canvas-elevated: #ebe4db;\n  --surface-1: #e8e0d6;\n  --surface-2: #ddd4c8;\n  --surface-3: #d0c6b8;\n  --warm-border: #c4b8a8;\n  --warm-border-strong: #a8987f;\n  --photo-black: #1c1917;\n\n  --text-strong: #1c1917;\n  --text-body: #292524;\n  --text-secondary: #44403c;\n  --text-muted: #78716c;\n  --text-faint: #a8a29e;\n}\n\n/* ===========================================================================\n   Iris — Typography tokens\n   Two families. Newsreader (a literary serif) carries all headings, the score\n   numerals, and pull quotes — it gives the product its \"editorial darkroom\"\n   voice. DM Sans handles UI, body, and labels.\n   =========================================================================== */\n\n:root {\n  /* --- Families --------------------------------------------------------- */\n  --font-serif: \"Newsreader\", Georgia, \"Times New Roman\", serif;\n  --font-sans: \"DM Sans\", ui-sans-serif, system-ui, -apple-system, sans-serif;\n\n  /* Semantic roles */\n  --font-display: var(--font-serif); /* h1–h3, hero, scores */\n  --font-body: var(--font-sans);     /* paragraphs, UI */\n  --font-numeric: var(--font-serif); /* large tabular score figures */\n\n  /* --- Type scale (px) -------------------------------------------------- */\n  --text-xs: 0.75rem;    /* 12 — eyebrows, helper */\n  --text-sm: 0.875rem;   /* 14 — secondary UI, captions */\n  --text-base: 1rem;     /* 16 — body */\n  --text-lg: 1.125rem;   /* 18 — lead body */\n  --text-xl: 1.25rem;    /* 20 — card titles */\n  --text-2xl: 1.5rem;    /* 24 — section heads */\n  --text-3xl: 1.875rem;  /* 30 — page titles */\n  --text-4xl: 2.25rem;   /* 36 — hero */\n  --text-5xl: 3rem;      /* 48 — display */\n  --text-6xl: 3.75rem;   /* 60 — marketing display */\n  --text-7xl: 4.5rem;    /* 72 — full-bleed hero */\n\n  /* --- Weights ---------------------------------------------------------- */\n  --weight-regular: 400;\n  --weight-medium: 500;\n  --weight-semibold: 600;\n  --weight-bold: 700;\n\n  /* --- Line heights ----------------------------------------------------- */\n  --leading-tight: 1.15;   /* display / headlines */\n  --leading-snug: 1.3;     /* card titles */\n  --leading-normal: 1.5;   /* body */\n  --leading-relaxed: 1.65; /* long-form mentor prose */\n\n  /* --- Letter spacing --------------------------------------------------- */\n  --tracking-tight: -0.02em;  /* large serif headings */\n  --tracking-display: -0.03em; /* hero / display serif — maximum contrast */\n  --tracking-normal: 0;\n  --tracking-wide: 0.05em;\n  --tracking-widest: 0.12em;  /* uppercase eyebrow labels */\n}\n\n/* ===========================================================================\n   Iris — Spacing, radii & layout tokens\n   A 4px base grid. Radii run generous and editorial — cards are rounded-xl\n   (12px) by default, modals/pitch panels rounded-2xl (16px), pills full.\n   =========================================================================== */\n\n:root {\n  /* --- Spacing scale (4px base) ---------------------------------------- */\n  --space-0: 0;\n  --space-1: 0.25rem;  /* 4 */\n  --space-2: 0.5rem;   /* 8 */\n  --space-3: 0.75rem;  /* 12 */\n  --space-4: 1rem;     /* 16 */\n  --space-5: 1.25rem;  /* 20 */\n  --space-6: 1.5rem;   /* 24 */\n  --space-8: 2rem;     /* 32 */\n  --space-10: 2.5rem;  /* 40 */\n  --space-12: 3rem;    /* 48 */\n  --space-16: 4rem;    /* 64 */\n\n  /* --- Border radii ----------------------------------------------------- */\n  --radius-sm: 0.375rem;  /* 6 — chips, tags */\n  --radius-md: 0.5rem;    /* 8 — buttons, inputs */\n  --radius-lg: 0.75rem;   /* 12 — cards, photo mats */\n  --radius-xl: 1rem;      /* 16 — modals, pitch panels */\n  --radius-2xl: 1.5rem;   /* 24 — large feature cards */\n  --radius-full: 9999px;  /* pills, score badges, avatars */\n\n  /* --- Border widths ---------------------------------------------------- */\n  --border-hairline: 1px;\n  --border-emphasis: 2px; /* selected nav (left rule), proposed cards */\n\n  /* --- Layout ----------------------------------------------------------- */\n  --sidebar-width: 13rem;   /* 208px — desktop nav rail */\n  --content-max: 64rem;     /* 1024px — reading column */\n  --content-wide: 72rem;    /* 1152px — gallery / contact sheet */\n}\n\n/* ===========================================================================\n   Iris — Elevation, shadow & effect tokens\n   Iris leans on INNER shadows (a print pressed into a mat) more than drop\n   shadows. Photo mats get an inset vignette; floating UI gets soft warm-black\n   drop shadows. A faint amber top-highlight (\"light catching the edge\") recurs.\n   =========================================================================== */\n\n:root {\n  /* --- Drop shadows (floating UI: modals, popovers, primary buttons) ---- */\n  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.25);\n  --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.30);\n  --shadow-lg: 0 10px 30px rgba(0, 0, 0, 0.40);\n  --shadow-2xl: 0 25px 50px -12px rgba(0, 0, 0, 0.55);\n\n  /* Amber glow — active CTA hover, focus halos, the analyzing aperture */\n  --shadow-brand: 0 8px 24px rgba(245, 158, 11, 0.25);\n\n  /* --- Inset / matting (photographs & wells) --------------------------- */\n  --shadow-inner: inset 0 2px 4px rgba(0, 0, 0, 0.30);\n  --vignette: inset 0 0 24px rgba(0, 0, 0, 0.45); /* @kind shadow */ /* on the print itself */\n  --edge-highlight: inset 0 1px 0 rgba(251, 191, 36, 0.06); /* @kind shadow */ /* warm top edge */\n\n  /* --- Focus ring ------------------------------------------------------- */\n  --focus-ring: 0 0 0 2px var(--canvas), 0 0 0 4px var(--brand-400);\n  --focus-outline-width: 2px;\n  --focus-outline-offset: 2px;\n\n  /* --- Film grain overlay (darkroom texture) --------------------------- */\n  /* Apply as a background-image on a pointer-events-none absolute layer at\n     ~0.04 opacity with mix-blend-mode: overlay. */\n  --film-grain: url(\"data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E\"); /* @kind other */\n  --film-grain-opacity: 0.04; /* @kind other */\n\n  /* --- Backdrop blur (overlays, hero captions over photographs) -------- */\n  --blur-sm: 4px; /* @kind other */\n  --blur-md: 8px; /* @kind other */\n}\n\n/* ===========================================================================\n   Iris — Motion tokens\n   Photography-mechanical motion: expo easings (like a shutter settling), a\n   gentle spring for sheets, and a darkroom drawer curve. Entrances fade-and-\n   rise; score badges pop in staggered. Nothing loops except the aperture.\n   =========================================================================== */\n\n:root {\n  /* --- Easing curves ---------------------------------------------------- */\n  --ease-out-expo: cubic-bezier(0.23, 1, 0.32, 1);     /* @kind other */ /* default UI exits */\n  --ease-in-out-expo: cubic-bezier(0.77, 0, 0.175, 1); /* @kind other */ /* symmetric moves */\n  --ease-drawer: cubic-bezier(0.32, 0.72, 0, 1);       /* @kind other */ /* sheets / drawers */\n  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);    /* @kind other */ /* modals, badges */\n\n  /* --- Durations -------------------------------------------------------- */\n  --dur-fast: 150ms;   /* @kind other */ /* hover, press, tab swaps */\n  --dur-base: 200ms;   /* @kind other */ /* most transitions */\n  --dur-slow: 280ms;   /* @kind other */ /* tab enter */\n  --dur-sheet: 400ms;  /* @kind other */ /* spring-in sheets/modals */\n  --dur-fade: 500ms;   /* @kind other */ /* content fade-in */\n\n  /* Press feedback — every button/role=button scales down on :active */\n  --press-scale: 0.97;  /* @kind other */\n}\n\n/* --- Keyframes ----------------------------------------------------------- */\n@keyframes iris-fadeIn {\n  from { opacity: 0; transform: translateY(10px); }\n  to   { opacity: 1; transform: translateY(0); }\n}\n\n@keyframes iris-springIn {\n  from { opacity: 0; transform: scale(0.92) translateY(20px); }\n  to   { opacity: 1; transform: scale(1) translateY(0); }\n}\n\n@keyframes iris-badgeIn {\n  from { opacity: 0; transform: scale(0.9); }\n  to   { opacity: 1; transform: scale(1); }\n}\n\n@keyframes iris-overlayFadeIn {\n  from { opacity: 0; }\n  to   { opacity: 1; }\n}\n\n/* Aperture loader blade pulse (the one intentional loop) */\n@keyframes iris-aperturePulse {\n  0%, 100% { transform: translateY(0) scaleY(0.7); opacity: 0.8; }\n  50%      { transform: translateY(0) scaleY(1);   opacity: 1; }\n}\n\n/* --- Utility classes ----------------------------------------------------- */\n.iris-animate-fadeIn  { animation: iris-fadeIn var(--dur-fade) var(--ease-out-expo) forwards; }\n.iris-animate-springIn { animation: iris-springIn var(--dur-sheet) var(--ease-spring) forwards; }\n\n@media (prefers-reduced-motion: reduce) {\n  .iris-animate-fadeIn,\n  .iris-animate-springIn { animation: none; }\n}\n\n/* ===========================================================================\n   Iris — Base / reset layer\n   Global element defaults derived from the product. Sets the warm canvas, the\n   serif-for-headings rule, amber selection, darkroom scrollbars, focus rings,\n   and the universal button press-scale. Helper classes mirror the app's\n   surface/text utilities so specimen cards and kits read like the real thing.\n   =========================================================================== */\n\nhtml { -webkit-text-size-adjust: 100%; }\n\nbody {\n  margin: 0;\n  background-color: var(--canvas);\n  color: var(--text-body);\n  font-family: var(--font-sans);\n  font-size: var(--text-base);\n  line-height: var(--leading-normal);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n  font-optical-sizing: auto;\n}\n\nh1, h2, h3 {\n  font-family: var(--font-serif);\n  color: var(--text-strong);\n  line-height: var(--leading-tight);\n  letter-spacing: var(--tracking-tight);\n  font-optical-sizing: auto;\n  margin: 0;\n}\n/* Largest display headings ride the top of Newsreader's optical-size axis\n   and tighten further — the editorial, lit-from-within voice. */\nh1 { letter-spacing: var(--tracking-display); font-variation-settings: \"opsz\" 60; }\nh4, h5, h6 { margin: 0; }\n\n.font-serif { font-family: var(--font-serif); }\n.font-sans  { font-family: var(--font-sans); }\n\n/* --- Selection ---------------------------------------------------------- */\n::selection { background-color: var(--selection); }\n\n/* --- Darkroom scrollbars ------------------------------------------------ */\n::-webkit-scrollbar { width: 8px; height: 8px; }\n::-webkit-scrollbar-track { background: var(--canvas); }\n::-webkit-scrollbar-thumb { background: var(--warm-border); border-radius: 4px; }\n::-webkit-scrollbar-thumb:hover { background: var(--warm-border-strong); }\n\n/* --- Focus + press ------------------------------------------------------ */\n:focus-visible {\n  outline: var(--focus-outline-width) solid var(--brand-400);\n  outline-offset: var(--focus-outline-offset);\n}\nbutton:not(:disabled),\n[role=\"button\"]:not(:disabled) {\n  transition: transform var(--dur-fast) var(--ease-out-expo);\n}\nbutton:active:not(:disabled),\n[role=\"button\"]:active:not(:disabled) {\n  transform: scale(var(--press-scale));\n}\n\n/* --- Surface & text helpers (mirror the app's utility names) ------------ */\n.bg-canvas   { background-color: var(--canvas); }\n.bg-elevated { background-color: var(--canvas-elevated); }\n.bg-surface-1 { background-color: var(--surface-1); }\n.bg-surface-2 { background-color: var(--surface-2); }\n.bg-surface-3 { background-color: var(--surface-3); }\n.bg-photo-black { background-color: var(--photo-black); }\n.border-warm { border-color: var(--warm-border); }\n.text-strong { color: var(--text-strong); }\n.text-muted  { color: var(--text-muted); }\n.text-brand  { color: var(--brand-400); }\n.text-on-brand { color: var(--text-on-brand); }\n\n/* Uppercase eyebrow label — used above nearly every section in the product */\n.eyebrow {\n  font-size: var(--text-xs);\n  font-weight: var(--weight-semibold);\n  text-transform: uppercase;\n  letter-spacing: var(--tracking-widest);\n  color: var(--text-muted);\n}\n\n/* Film grain overlay helper */\n.film-grain {\n  position: absolute;\n  inset: 0;\n  pointer-events: none;\n  opacity: var(--film-grain-opacity);\n  mix-blend-mode: overlay;\n  background-image: var(--film-grain);\n}\n\n<\u002Fstyle>\n<script src=\"c371b9f8-3c30-4f1c-81df-94136d7405c3\"><\u002Fscript>\n<style>\n  :root { --site-max: 1180px; --gutter: clamp(20px, 5vw, 64px); }\n  * { box-sizing: border-box; }\n  body { margin: 0; background: var(--canvas); color: var(--text-body); }\n  img { display: block; max-width: 100%; }\n  a { color: inherit; text-decoration: none; }\n\n  /* Consistent warm darkroom grade on placeholder imagery */\n  .grade { filter: saturate(0.86) contrast(1.04) sepia(0.10) brightness(0.97); }\n\n  .wrap { max-width: var(--site-max); margin: 0 auto; padding-inline: var(--gutter); }\n  .eyebrow { font-size: 12px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--brand-600); margin: 0; }\n\n  /* ---- Nav ---- */\n  header.nav { position: sticky; top: 0; z-index: 50; background: color-mix(in srgb, var(--canvas) 88%, transparent); backdrop-filter: blur(10px); border-bottom: 1px solid var(--warm-border); }\n  .nav-inner { display: flex; align-items: center; justify-content: space-between; height: 72px; }\n  .brand { display: flex; align-items: center; gap: 12px; }\n  .brand img { width: 34px; height: 34px; object-fit: contain; }\n  @keyframes irisFocus { from { transform: rotate(-110deg); } to { transform: rotate(0); } }\n  .iris-focus-spin { animation: irisFocus 0.9s var(--ease-out-expo) both; }\n  @media (prefers-reduced-motion: reduce) { .iris-focus-spin { animation: none; } }\n  .brand .wm { font-family: var(--font-serif); font-weight: 700; font-size: 24px; letter-spacing: -0.02em; color: var(--text-strong); line-height: 1; }\n  .nav-links { display: flex; align-items: center; gap: 34px; }\n  .nav-links a { font-size: 14px; color: var(--text-secondary); transition: color 150ms var(--ease-out-expo); }\n  .nav-links a:hover { color: var(--text-strong); }\n  .btn { display: inline-flex; align-items: center; gap: 8px; font-family: var(--font-sans); font-weight: 600; cursor: pointer; border-radius: var(--radius-md); border: 1px solid transparent; transition: background 150ms var(--ease-out-expo), color 150ms var(--ease-out-expo), border-color 150ms; }\n  .btn-sm { font-size: 14px; padding: 9px 16px; }\n  .btn-lg { font-size: 16px; padding: 14px 26px; border-radius: var(--radius-lg); }\n  .btn-primary { background: var(--brand-500); color: var(--text-on-brand); }\n  .btn-primary:hover { background: var(--brand-600); }\n  .btn-ghost { background: transparent; color: var(--text-strong); border-color: var(--warm-border); }\n  .btn-ghost:hover { border-color: var(--brand-500); color: var(--brand-700); }\n\n  /* ---- Hero ---- */\n  .hero { padding: clamp(48px, 8vw, 104px) 0 clamp(40px, 6vw, 72px); }\n  .hero-grid { display: grid; grid-template-columns: 1.05fr 0.95fr; gap: clamp(32px, 5vw, 72px); align-items: center; }\n  .hero h1 { font-family: var(--font-serif); font-weight: 700; font-size: clamp(44px, 6vw, 72px); line-height: 1.04; letter-spacing: -0.03em; color: var(--text-strong); margin: 20px 0 0; text-wrap: balance; }\n  .hero p.lede { font-size: clamp(17px, 1.6vw, 20px); line-height: 1.6; color: var(--text-secondary); max-width: 30em; margin: 22px 0 0; }\n  .hero .cta { display: flex; gap: 14px; margin-top: 34px; flex-wrap: wrap; }\n  .hero .meta { margin-top: 26px; font-size: 13px; color: var(--text-muted); display: flex; gap: 18px; align-items: center; }\n  .hero .meta .dot { width: 4px; height: 4px; border-radius: 50%; background: var(--warm-border-strong); }\n\n  /* Matted hero photo */\n  .mat { background: var(--photo-black); padding: 14px; border-radius: var(--radius-2xl); border: 1px solid var(--warm-border); box-shadow: var(--shadow-lg); position: relative; }\n  .mat .print { position: relative; border-radius: var(--radius-lg); overflow: hidden; aspect-ratio: 4 / 5; box-shadow: var(--vignette); }\n  .mat .print img { width: 100%; height: 100%; object-fit: cover; }\n  .score-float { position: absolute; left: -18px; bottom: 36px; display: inline-flex; align-items: baseline; gap: 5px; background: var(--brand-500); color: var(--text-on-brand); border-radius: var(--radius-full); padding: 12px 20px; box-shadow: var(--shadow-lg); }\n  .score-float b { font-family: var(--font-serif); font-weight: 700; font-size: 34px; line-height: 1; }\n  .score-float span { font-size: 13px; font-weight: 600; opacity: 0.72; }\n  .caption-chip { position: absolute; right: 24px; top: 28px; background: color-mix(in srgb, var(--canvas) 92%, transparent); backdrop-filter: blur(8px); border: 1px solid var(--warm-border); border-radius: var(--radius-md); padding: 8px 12px; font-size: 12px; color: var(--text-secondary); }\n\n  /* ---- Section scaffolding ---- */\n  section { padding: clamp(56px, 8vw, 110px) 0; }\n  .sec-head { max-width: 30em; }\n  .sec-head h2 { font-family: var(--font-serif); font-weight: 700; font-size: clamp(30px, 3.6vw, 44px); line-height: 1.1; letter-spacing: -0.02em; color: var(--text-strong); margin: 14px 0 0; text-wrap: balance; }\n  .sec-head p { font-size: 17px; line-height: 1.6; color: var(--text-secondary); margin: 18px 0 0; }\n\n  .rule { border: none; border-top: 1px solid var(--warm-border); margin: 0; }\n\n  /* ---- Glass Box demo ---- */\n  .glassbox { display: grid; grid-template-columns: 1fr 1fr; gap: clamp(28px, 4vw, 64px); align-items: center; margin-top: 44px; }\n  .dims { display: flex; flex-direction: column; gap: 18px; }\n  .dim { }\n  .dim .top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }\n  .dim .top .l { font-size: 15px; color: var(--text-secondary); }\n  .dim .top .v { font-family: var(--font-serif); font-size: 17px; color: var(--text-strong); font-variant-numeric: tabular-nums; }\n  .dim .track { height: 7px; border-radius: 4px; background: var(--surface-2); overflow: hidden; }\n  .dim .fill { height: 100%; border-radius: 4px; background: linear-gradient(to right, var(--brand-600), var(--brand-400)); }\n  .reasoning { font-size: 16px; line-height: 1.7; color: var(--text-secondary); margin: 22px 0 0; }\n  .reasoning .first { font-family: var(--font-serif); font-size: 19px; color: var(--text-strong); line-height: 1.55; }\n\n  /* ---- Positioning band ---- */\n  .band { background: var(--photo-black); color: #f5f0ea; }\n  .band .wrap { padding-block: clamp(56px, 8vw, 104px); }\n  .band h2 { font-family: var(--font-serif); font-weight: 700; font-size: clamp(28px, 3.2vw, 40px); line-height: 1.18; letter-spacing: -0.02em; color: #fff; margin: 16px 0 0; max-width: 18em; text-wrap: balance; }\n  .band .nots { display: flex; gap: 14px; flex-wrap: wrap; margin-top: 34px; }\n  .band .not { border: 1px solid rgba(245,240,234,0.18); border-radius: var(--radius-full); padding: 9px 18px; font-size: 14px; color: rgba(245,240,234,0.72); }\n  .band .not s { color: rgba(245,240,234,0.4); }\n  .band .yes { margin-top: 26px; font-size: 18px; color: var(--brand-400); font-family: var(--font-serif); }\n\n  /* ---- Pillars ---- */\n  .pillars { display: grid; grid-template-columns: repeat(3, 1fr); gap: 28px; margin-top: 52px; }\n  .pillar { }\n  .pillar .ic { width: 46px; height: 46px; border-radius: var(--radius-md); background: var(--brand-wash-15); color: var(--brand-700); display: flex; align-items: center; justify-content: center; }\n  .pillar h3 { font-family: var(--font-serif); font-size: 22px; color: var(--text-strong); margin: 18px 0 0; letter-spacing: -0.01em; }\n  .pillar p { font-size: 15px; line-height: 1.6; color: var(--text-muted); margin: 10px 0 0; }\n\n  /* ---- Personas ---- */\n  .personas { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-top: 48px; }\n  .persona { border: 1px solid var(--warm-border); border-radius: var(--radius-2xl); padding: 34px; background: color-mix(in srgb, var(--surface-1) 60%, transparent); transition: border-color 200ms var(--ease-out-expo), transform 200ms var(--ease-out-expo); }\n  .persona:hover { border-color: var(--brand-500); transform: translateY(-3px); }\n  .persona h3 { font-family: var(--font-serif); font-size: 26px; color: var(--text-strong); margin: 0; }\n  .persona p { font-size: 15px; line-height: 1.6; color: var(--text-secondary); margin: 12px 0 0; }\n  .persona .go { margin-top: 20px; font-size: 14px; font-weight: 600; color: var(--brand-700); }\n\n  /* ---- Closing CTA ---- */\n  .closing { text-align: center; }\n  .closing h2 { font-family: var(--font-serif); font-weight: 700; font-size: clamp(34px, 5vw, 60px); line-height: 1.06; letter-spacing: -0.03em; color: var(--text-strong); margin: 16px auto 0; max-width: 14em; text-wrap: balance; }\n  .closing .cta { display: flex; gap: 14px; justify-content: center; margin-top: 34px; }\n\n  /* ---- Footer ---- */\n  footer.ft { border-top: 1px solid var(--warm-border); padding: 44px 0; }\n  .ft-inner { display: flex; justify-content: space-between; align-items: center; gap: 20px; flex-wrap: wrap; }\n  .ft .brand .wm { font-size: 20px; }\n  .ft-links { display: flex; gap: 26px; font-size: 14px; color: var(--text-muted); }\n  .ft .fine { font-size: 13px; color: var(--text-faint); }\n\n  /* content is always visible; no animation gates visibility */\n  .rise { opacity: 1; }\n\n  @media (max-width: 900px) {\n    .hero-grid, .glassbox, .pillars, .personas { grid-template-columns: 1fr; }\n    .nav-links { display: none; }\n    .pillars { gap: 36px; }\n  }\n<\u002Fstyle>\n\n<\u002Fhead>\n<body>\n\n<header class=\"nav\">\n  <div class=\"wrap nav-inner\">\n    <a class=\"brand\" href=\"#top\">\n      <svg viewBox=\"0 0 100 100\" fill=\"none\" xmlns=\"http://www.w3.org/2000/svg\" width=\"34\" height=\"34\" aria-hidden=\"true\" class=\"iris-focus-spin\"><circle cx=\"50\" cy=\"50\" r=\"46\" stroke=\"#d97706\" stroke-width=\"3.6\"/><line x1=\"76\" y1=\"50\" x2=\"76\" y2=\"87.95\" stroke=\"#d97706\" stroke-width=\"4.6\" stroke-linecap=\"round\"/><line x1=\"63\" y1=\"72.52\" x2=\"30.14\" y2=\"91.49\" stroke=\"#d97706\" stroke-width=\"4.6\" stroke-linecap=\"round\"/><line x1=\"37\" y1=\"72.52\" x2=\"4.14\" y2=\"53.54\" stroke=\"#d97706\" stroke-width=\"4.6\" stroke-linecap=\"round\"/><line x1=\"24\" y1=\"50\" x2=\"24\" y2=\"12.05\" stroke=\"#d97706\" stroke-width=\"4.6\" stroke-linecap=\"round\"/><line x1=\"37\" y1=\"27.48\" x2=\"69.86\" y2=\"8.51\" stroke=\"#d97706\" stroke-width=\"4.6\" stroke-linecap=\"round\"/><line x1=\"63\" y1=\"27.48\" x2=\"95.86\" y2=\"46.46\" stroke=\"#d97706\" stroke-width=\"4.6\" stroke-linecap=\"round\"/><circle cx=\"50\" cy=\"50\" r=\"26\" stroke=\"#d97706\" stroke-width=\"3.6\"/><circle cx=\"50\" cy=\"50\" r=\"14\" fill=\"#1a1816\" stroke=\"#fbbf24\" stroke-width=\"2.8\"/><circle cx=\"45.52\" cy=\"45.52\" r=\"3.5\" fill=\"#fbbf24\"/><\u002Fsvg>\n      <span class=\"wm\">Iris<\u002Fspan>\n    <\u002Fa>\n    <nav class=\"nav-links\">\n      <a href=\"#glassbox\">Glass Box<\u002Fa>\n      <a href=\"#how\">How it works<\u002Fa>\n      <a href=\"#who\">Who it's for<\u002Fa>\n    <\u002Fnav>\n    <a class=\"btn btn-sm btn-primary\" href=\"https://iris-photo-mentor.web.app\">Open the app<\u002Fa>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<main id=\"top\">\n  <!-- HERO -->\n  <section class=\"hero\">\n    <div class=\"wrap hero-grid\">\n      <div class=\"rise\">\n        <p class=\"eyebrow\">AI photography mentor<\u002Fp>\n        <h1>The mentor who remembers every frame.<\u002Fh1>\n        <p class=\"lede\">Iris critiques your photographs on five dimensions, shows its reasoning, and remembers everything you shoot — so coaching compounds instead of resetting. A darkroom mentor, not a generic chatbot.<\u002Fp>\n        <div class=\"cta\">\n          <a class=\"btn btn-lg btn-primary\" href=\"https://iris-photo-mentor.web.app\">Upload your first photo<\u002Fa>\n          <a class=\"btn btn-lg btn-ghost\" href=\"#glassbox\">See a Glass Box critique →<\u002Fa>\n        <\u002Fdiv>\n        <div class=\"meta\">\n          <span>Five-dimension critique<\u002Fspan><span class=\"dot\"><\u002Fspan>\n          <span>Persistent portfolio memory<\u002Fspan><span class=\"dot\"><\u002Fspan>\n          <span>Practice that targets your weak areas<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"rise\">\n        <div class=\"mat\">\n          <div class=\"print\"><img class=\"grade\" src=\"625bb51d-d2bc-4419-a46f-9a8f8ea32880\" alt=\"Panoramic mountain ridge at golden hour\"><\u002Fdiv>\n          <div class=\"score-float\"><b>8.6<\u002Fb><span>/ 10<\u002Fspan><\u002Fdiv>\n          <div class=\"caption-chip\">Best in your library<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <hr class=\"rule\">\n\n  <!-- GLASS BOX -->\n  <section id=\"glassbox\">\n    <div class=\"wrap\">\n      <div class=\"sec-head\">\n        <p class=\"eyebrow\">Glass Box critique<\u002Fp>\n        <h2>Every score, with the reasoning shown.<\u002Fh2>\n        <p>No black-box number. Iris scores composition, lighting, technique, creativity, and subject impact — then tells you exactly why, and what to change next.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"glassbox\">\n        <div class=\"mat\">\n          <div class=\"print\" style=\"aspect-ratio: 4 / 3;\"><img class=\"grade\" src=\"eb93ad7f-c86b-4135-b2bf-c2121dd50773\" alt=\"Mountain reflection on a still lake\"><\u002Fdiv>\n          <div class=\"score-float\" style=\"left:-16px; bottom:28px;\"><b>8.3<\u002Fb><span>/ 10<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div class=\"dims\">\n            <div class=\"dim\"><div class=\"top\"><span class=\"l\">Composition<\u002Fspan><span class=\"v\">8.5<\u002Fspan><\u002Fdiv><div class=\"track\"><div class=\"fill\" style=\"width:85%\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n            <div class=\"dim\"><div class=\"top\"><span class=\"l\">Lighting<\u002Fspan><span class=\"v\">8.2<\u002Fspan><\u002Fdiv><div class=\"track\"><div class=\"fill\" style=\"width:82%\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n            <div class=\"dim\"><div class=\"top\"><span class=\"l\">Technique<\u002Fspan><span class=\"v\">8.1<\u002Fspan><\u002Fdiv><div class=\"track\"><div class=\"fill\" style=\"width:81%\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n            <div class=\"dim\"><div class=\"top\"><span class=\"l\">Creativity<\u002Fspan><span class=\"v\">7.9<\u002Fspan><\u002Fdiv><div class=\"track\"><div class=\"fill\" style=\"width:79%\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n            <div class=\"dim\"><div class=\"top\"><span class=\"l\">Subject impact<\u002Fspan><span class=\"v\">8.2<\u002Fspan><\u002Fdiv><div class=\"track\"><div class=\"fill\" style=\"width:82%\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <p class=\"reasoning\"><span class=\"first\">A glass-still lake doubles the ridgeline into a clean mirror, and the low horizon hands the frame a near-perfect symmetry.<\u002Fspan> Cool blues hold the shadows while the peak keeps a touch of warm light — restful, but never flat. To push it further, place a small foreground anchor at the waterline; the eye wants one detail to enter on before it floats up to the reflection.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- POSITIONING BAND -->\n  <section class=\"band\">\n    <div class=\"wrap\">\n      <p class=\"eyebrow\" style=\"color: var(--brand-400);\">What Iris is<\u002Fp>\n      <h2>A mentor that evolves with you — deliberately slow, and thoughtful.<\u002Fh2>\n      <div class=\"nots\">\n        <span class=\"not\">Not a photo <s>editor<\u002Fs><\u002Fspan>\n        <span class=\"not\">Not a <s>culling<\u002Fs> tool<\u002Fspan>\n        <span class=\"not\">Not a social <s>feed<\u002Fs><\u002Fspan>\n        <span class=\"not\">No likes, no followers<\u002Fspan>\n      <\u002Fdiv>\n      <p class=\"yes\">Just the mentor-and-evolve loop: shoot, critique, practice, remember.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- PILLARS -->\n  <section id=\"how\">\n    <div class=\"wrap\">\n      <div class=\"sec-head\">\n        <p class=\"eyebrow\">How it works<\u002Fp>\n        <h2>Three habits, one growing library.<\u002Fh2>\n      <\u002Fdiv>\n      <div class=\"pillars\">\n        <div class=\"pillar\">\n          <div class=\"ic\"><i data-lucide=\"aperture\"><\u002Fi><\u002Fdiv>\n          <h3>Glass Box critique<\u002Fh3>\n          <p>Upload a frame and get five scored dimensions with visible reasoning and one clear thing to try next.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"pillar\">\n          <div class=\"ic\"><i data-lucide=\"target\"><\u002Fi><\u002Fdiv>\n          <h3>Practice that targets weakness<\u002Fh3>\n          <p>Iris proposes a focused assignment aimed at your lowest-scoring skill — you accept or pass, then shoot.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"pillar\">\n          <div class=\"ic\"><i data-lucide=\"message-circle\"><\u002Fi><\u002Fdiv>\n          <h3>Portfolio-aware mentor<\u002Fh3>\n          <p>Ask anything. Iris answers with your whole library in mind — it has seen every frame you've uploaded.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <hr class=\"rule\">\n\n  <!-- PERSONAS -->\n  <section id=\"who\">\n    <div class=\"wrap\">\n      <div class=\"sec-head\">\n        <p class=\"eyebrow\">Who it's for<\u002Fp>\n        <h2>Whether you're learning or selling.<\u002Fh2>\n      <\u002Fdiv>\n      <div class=\"personas\">\n        <a class=\"persona\" href=\"https://iris-photo-mentor.web.app\">\n          <h3>Hobbyist<\u002Fh3>\n          <p>Critique, practice assignments, and a contact-sheet library that grows with every shoot. Watch your scores climb.<\u002Fp>\n          <div class=\"go\">Start as hobbyist →<\u002Fdiv>\n        <\u002Fa>\n        <a class=\"persona\" href=\"https://iris-photo-mentor.web.app\">\n          <h3>Working pro<\u002Fh3>\n          <p>Everything in Hobbyist, plus print-listing drafts and portfolio insight — nothing goes live until you approve each card.<\u002Fp>\n          <div class=\"go\">Start as working pro →<\u002Fdiv>\n        <\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- CLOSING -->\n  <section class=\"closing\">\n    <div class=\"wrap\">\n      <p class=\"eyebrow\">Start tonight<\u002Fp>\n      <h2>Your next frame is the start of the record.<\u002Fh2>\n      <div class=\"cta\">\n        <a class=\"btn btn-lg btn-primary\" href=\"https://iris-photo-mentor.web.app\">Open the app<\u002Fa>\n        <a class=\"btn btn-lg btn-ghost\" href=\"#glassbox\">See a critique first →<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n<\u002Fmain>\n\n<footer class=\"ft\">\n  <div class=\"wrap ft-inner\">\n    <div class=\"brand\"><svg viewBox=\"0 0 100 100\" fill=\"none\" stroke=\"#d97706\" stroke-linecap=\"round\" stroke-linejoin=\"round\" width=\"28\" height=\"28\" aria-hidden=\"true\" style
